spring:
  application:
    name: aiphra-backend
  datasource:
    url: jdbc:mysql://${DB_MYSQL_HOST:127.0.0.1}:${DB_MYSQL_PORT:3306}/${DB_MYSQL_NAME:}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: ${DB_MYSQL_USER:}
    password: ${DB_MYSQL_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

server:
  port: ${SERVER_PORT:8080}

app:
  secret: ${APP_SECRET:}
  api:
    default-version: ${API_DEFAULT_VERSION:1}
    supported-versions: ${API_SUPPORTED_VERSIONS:1}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-second: ${RATE_LIMIT_REQUESTS_PER_SECOND:2}
