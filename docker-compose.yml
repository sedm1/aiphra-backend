services:
  php:
    image: ghcr.io/sedm1/aiphra-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "8.5"
    container_name: aiphra-backend-php
    restart: unless-stopped
    volumes:
      - ./public:/var/www/html/public:ro
      - ./.env:/var/www/html/public:ro
    networks:
      - aiphra-net
    env_file:
      - .env

  nginx:
    image: nginx:1.27-alpine
    container_name: aiphra-backend-nginx
    depends_on:
      - php
    restart: unless-stopped
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8080"
    networks:
      - aiphra-net

networks:
  aiphra-net:
    external: true
